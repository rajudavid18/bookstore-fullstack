# ============================================================
#  Bookstore Application - Configuration
# ============================================================

server.port=8081
spring.application.name=bookstore

# ── H2 In-Memory Database ────────────────────────────────────
# No MySQL/PostgreSQL needed! H2 runs inside the app itself.
spring.datasource.url=jdbc:h2:mem:bookstoredb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=david
spring.datasource.password=kdr

# ── JPA / Hibernate ──────────────────────────────────────────
# create-drop = creates tables on startup, drops on shutdown
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# ── H2 Web Console ───────────────────────────────────────────
# Visit http://localhost:8080/h2-console to browse the database visually!
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Actuator ─────────────────────────────────────────────────
# Visit http://localhost:8080/actuator/health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Bookstore API
info.app.version=1.0.0

# ── Logging ──────────────────────────────────────────────────
logging.level.com.demo=DEBUG
